<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-4"
  >
    <main
      class="bg-white p-4 p-sm-5 rounded border shadow-sm w-100"
      style="max-width: 600px"
    >
      <h1 class="text-center mb-5 fs-3 fw-semibold">Roth IRA Calculator</h1>

      <form action="/submitform">
        <div class="row mb-3 align-items-center">
          <label for="balance" class="col-sm-5 col-form-label"
            >Balance ($)</label
          >
          <div class="col-sm-7">
            <input
              type="text"
              class="form-control"
              id="balance"
              name="balance"
            />
          </div>
        </div>

        <div class="row mb-3 align-items-center">
          <label for="contribution" class="col-sm-5 col-form-label"
            >Annual Contribution ($)</label
          >
          <div class="col-sm-7">
            <input
              type="text"
              class="form-control"
              id="contribution"
              name="contribution"
            />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-form-label col-sm-5 pt-0 fs-6">
            Maximize contributions?
          </legend>
          <div class="col-sm-7">
            <div class="form-check mb-1">
              <input
                class="form-check-input"
                type="radio"
                name="maximimize"
                id="yes"
                value="yes"
              />
              <label class="form-check-label" for="yes">Yes</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="maximimize"
                id="no"
                value="no"
              />
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>

        <div class="row mb-3 align-items-center">
          <label for="rate" class="col-sm-5 col-form-label"
            >Expected return (%)</label
          >
          <div class="col-sm-7">
            <input type="number" class="form-control" name="rate" id="rate" />
          </div>
        </div>

        <div class="row mb-3 align-items-center">
          <label for="current" class="col-sm-5 col-form-label"
            >Current age</label
          >
          <div class="col-sm-7">
            <input
              type="number"
              class="form-control"
              name="current"
              id="current"
            />
          </div>
        </div>

        <div class="row mb-3 align-items-center">
          <label for="retire" class="col-sm-5 col-form-label"
            >Retirement age</label
          >
          <div class="col-sm-7">
            <input
              type="number"
              class="form-control"
              name="retire"
              id="retire"
            />
          </div>
        </div>

        <div class="row mb-4 align-items-center">
          <label for="tax" class="col-sm-5 col-form-label">Tax rate (%)</label>
          <div class="col-sm-7">
            <input type="number" class="form-control" name="tax" id="tax" />
          </div>
        </div>

        <div class="row g-2 mb-4 mt-2">
          <div class="col-6">
            <input
              type="submit"
              class="btn btn-primary w-100 py-2"
              value="Calculate"
            />
          </div>
          <div class="col-6">
            <input
              type="reset"
              class="btn bg-white border text-secondary w-100 py-2"
              value="Reset"
            />
          </div>
        </div>
      </form>

      <div class="text-secondary" style="font-size: 0.9rem">
        <p class="mb-1">
          This exercise is a simplified version of the Roth IRA Calculator
          <a href="https://www.calculator.net/">Calculator.net</a>
        </p>
      </div>
    </main>
  </body>
</html>
